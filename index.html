<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bespoke Suit Splash</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/splash.css" />
</head>
<body>
  <div class="splash-screen d-flex flex-column justify-content-center align-items-center">
    <h3 class="text-white mb-3">Welcome Back,</h3>

    <img src="/images/logo.png" alt="Bespoke Suit Logo" class="logo mb-4" />
    <h3 class="text-white mb-3">Loading.....</h3>
<div class="progress w-25">
  <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
       role="progressbar" 
       style="width: 0%" 
       aria-valuenow="0" 
       aria-valuemin="0" 
       aria-valuemax="100">
  </div>
</div>

      

    <footer class="footer mt-auto text-center">
      <small class="text-secondary-50">Version 1.0.0 &nbsp; | &nbsp; © 2025 Bespoke Suit Ltd. All rights reserved.</small>
    </footer>
  </div>

  <script src="/js/splash.js"></script>
</body>
</html>
